<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Özgün.tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #e4dfd8;
    color: #111827;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  #app {
    max-width: 430px;
    margin: 0 auto;
    background: #f2ede7;
    min-height: 100vh;
    box-shadow: 0 0 60px rgba(0,0,0,0.1);
  }
  input[type="number"], input[type="text"] { -moz-appearance: textfield; outline: none; }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  button { cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div id="app"></div>
<script>

// ══════════════════════════════════════════════════════
//  ALIŞKANLIKLAR
//  Yeni alışkanlık eklemek için aynı formatta satır ekle.
//  hasHours: true → tik'in yanında saat girişi açar
//  Kategoriler: body · mind · discipline · soul
// ══════════════════════════════════════════════════════
const HABITS = [
  { id: "morning_water", emoji: "🥛", label: "Uyanır Uyanmaz Büyük Bardak Su", category: "body" },
  { id: "morning_pages", emoji: "📝", label: "Sabah 3 Sayfa Beyin Boşaltma",   category: "mind" },
  { id: "reading",       emoji: "📖", label: "30dk Okuma",                      category: "mind" },
  { id: "water",         emoji: "💧", label: "2.5L Su",                         category: "body" },
  { id: "fasting",       emoji: "⏳", label: "Aralıklı Oruç",                   category: "body", hasHours: true },
  { id: "steps",         emoji: "👣", label: "5000+ Adım",                      category: "body" },
  { id: "ontime",        emoji: "⏰", label: "İşe Zamanında",                   category: "discipline" },
];

const START_WEIGHT = 128.8;

const CAT = {
  body:       { color: "#16a34a", bg: "#bbf7d0", border: "#86efac", label: "Beden"    },
  mind:       { color: "#2563eb", bg: "#bfdbfe", border: "#93c5fd", label: "Zihin"    },
  discipline: { color: "#dc2626", bg: "#fecdd3", border: "#fca5a5", label: "Disiplin" },
  soul:       { color: "#d97706", bg: "#fde68a", border: "#fbbf24", label: "Ruh"      },
};

// ── Veri ─────────────────────────────────────────────
const KEY = "ozgun_v2";
function load() { try { const r = localStorage.getItem(KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function dk(d) {
  const dt = d instanceof Date ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function today() { return dk(new Date()); }
function dayName(d) { return ["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"][new Date(d+"T00:00:00").getDay()]; }

// ── Hesaplamalar ──────────────────────────────────────
function score(data, k) {
  const h = data[k]?.habits || {};
  return Math.round(HABITS.filter(x => h[x.id]).length / HABITS.length * 100);
}

function streak(data) {
  let s = 0, d = new Date();
  if (score(data, dk(d)) === 0) d.setDate(d.getDate() - 1);
  while (score(data, dk(d)) >= 50) { s++; d.setDate(d.getDate() - 1); }
  return s;
}

function lastWeight(data) {
  for (const k of Object.keys(data).sort().reverse())
    if (data[k]?.weight) return data[k].weight;
  return null;
}

function weekDays(cd) {
  const t = new Date(cd + "T00:00:00");
  const mon = new Date(t);
  mon.setDate(t.getDate() - ((t.getDay() + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const k = dk(d);
    return { key: k, name: dayName(k), num: d.getDate(), isToday: k === today(), isFuture: d > new Date() };
  });
}

// ── State ─────────────────────────────────────────────
let S = { data: load(), cd: today(), view: "today" };

function dayData(cd) {
  if (!S.data[cd]) S.data[cd] = { habits: {}, fastingHours: null, weight: null, stepCount: null, spending: null, tasks: [] };
  if (!S.data[cd].tasks) S.data[cd].tasks = [];
  return S.data[cd];
}

// ── Render ────────────────────────────────────────────
function render() {
  const { data, cd, view } = S;
  const sc  = score(data, cd);
  const sr  = streak(data);
  const dd  = dayData(cd);
  const habits = dd.habits;
  const isToday = cd === today();
  const wk  = weekDays(cd);
  const lw  = lastWeight(data);
  const wc  = lw ? (lw - START_WEIGHT).toFixed(1) : null;
  const scoreColor = sc >= 75 ? "#16a34a" : sc >= 50 ? "#d97706" : sc > 0 ? "#dc2626" : "#9ca3af";

  // ── Header ────────────────────────────────────────
  let html = `
  <div style="background:#f2ede7;padding:22px 20px 16px;border-bottom:1px solid #d9d2c9">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div>
        <div style="font-size:.6rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#9ca3af">özgün</div>
        <div style="font-size:1.5rem;font-weight:700;color:#111;margin-top:1px;letter-spacing:-.5px">tracker</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:2.8rem;font-weight:700;line-height:1;color:${scoreColor};letter-spacing:-2px">${sc}<span style="font-size:1.1rem;color:#d1d5db;font-weight:400">%</span></div>
        <div style="font-size:.55rem;color:#9ca3af;letter-spacing:1.5px;margin-top:1px">GÜNLÜK SKOR</div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;background:#e8e2da;border-radius:8px;padding:8px 12px">
        <div style="font-size:.5rem;color:#c4c4c4;letter-spacing:1.5px;margin-bottom:3px">SERİ</div>
        <div style="font-size:.78rem;font-weight:500;color:${sr>=3?'#d97706':'#6b7280'}">${sr >= 1 ? `🔥 ${sr} gün` : 'Bugün başla'}</div>
      </div>
      <div style="flex:1;background:#e8e2da;border-radius:8px;padding:8px 12px">
        <div style="font-size:.5rem;color:#c4c4c4;letter-spacing:1.5px;margin-bottom:3px">KİLO</div>
        <div style="font-size:.78rem;font-weight:500">${lw ? `${lw} kg <span style="color:${parseFloat(wc) <= 0 ? '#16a34a' : '#dc2626'};font-size:.68rem">${wc > 0 ? '+' : ''}${wc}</span>` : '<span style="color:#d1d5db">—</span>'}</div>
      </div>
    </div>
  </div>`;

  // ── Tarih Navigasyon ──────────────────────────────
  html += `
  <div style="background:#f2ede7;padding:10px 20px;border-bottom:1px solid #d9d2c9;display:flex;align-items:center;justify-content:space-between">
    <button onclick="navDate(-1)" style="background:none;border:none;padding:6px 10px;color:#9ca3af;font-size:1.1rem;border-radius:6px">←</button>
    <div style="text-align:center">
      <div style="font-size:.85rem;font-weight:600;color:${isToday ? '#111' : '#6b7280'}">
        ${isToday ? 'Bugün' : new Date(cd + 'T00:00:00').toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' })}
      </div>
      ${!isToday ? '<button onclick="goToday()" style="background:none;border:none;color:#2563eb;font-size:.65rem;margin-top:3px">← bugüne dön</button>' : ''}
    </div>
    <button onclick="navDate(1)" style="background:none;border:none;padding:6px 10px;color:${isToday ? '#e5e7eb' : '#9ca3af'};font-size:1.1rem;border-radius:6px">→</button>
  </div>`;

  // ── Hafta Şeridi ──────────────────────────────────
  html += `<div style="display:flex;background:#f2ede7;border-bottom:1px solid #d9d2c9;padding:10px 14px;gap:4px">`;
  for (const d of wk) {
    const s = score(data, d.key);
    const isSelected = d.key === cd;
    const bg = isSelected ? '#111' : d.isFuture ? 'transparent' : s >= 75 ? '#dcfce7' : s >= 50 ? '#fef3c7' : s > 0 ? '#fee2e2' : '#e0d9d1';
    const col = isSelected ? '#fff' : d.isFuture ? '#e5e7eb' : '#111';
    html += `<button onclick="setDate('${d.key}')" style="flex:1;border:none;background:${bg};border-radius:8px;padding:7px 3px;display:flex;flex-direction:column;align-items:center;gap:1px">
      <div style="font-size:.5rem;color:${isSelected ? 'rgba(255,255,255,.6)' : '#9ca3af'}">${d.name}</div>
      <div style="font-size:.8rem;font-weight:${isSelected ? 700 : 400};color:${col}">${d.num}</div>
      <div style="font-size:.5rem;color:${isSelected ? 'rgba(255,255,255,.7)' : '#9ca3af'};height:10px;display:flex;align-items:center">${!d.isFuture && s > 0 ? s + '%' : ''}</div>
    </button>`;
  }
  html += `</div>`;

  // ── Sekmeler ──────────────────────────────────────
  html += `<div style="display:flex;background:#f2ede7;border-bottom:1px solid #d9d2c9">`;
  for (const [k, l] of [['today', 'Günlük'], ['week', 'Hafta'], ['data', 'Veri']]) {
    html += `<button onclick="setView('${k}')" style="flex:1;padding:10px;background:none;border:none;border-bottom:2px solid ${view === k ? '#111' : 'transparent'};color:${view === k ? '#111' : '#9ca3af'};font-size:.72rem;font-weight:${view === k ? 600 : 400};letter-spacing:.5px">${l}</button>`;
  }
  html += `</div>`;

  html += `<div style="padding:20px 20px 100px">`;

  // ══════════════ GÜNLÜK GÖRÜNÜM ══════════════════
  if (view === 'today') {

    for (const [ck, ci] of Object.entries(CAT)) {
      const ch = HABITS.filter(h => h.category === ck);
      if (!ch.length) continue;

      html += `<div style="margin-bottom:22px">
        <div style="font-size:.55rem;font-weight:700;color:${ci.color};letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${ci.label}</div>`;

      for (const h of ch) {
        const checked = habits[h.id] || false;

        if (h.hasHours) {
          const fh = dd.fastingHours != null ? dd.fastingHours : '';
          html += `
          <div style="display:flex;align-items:center;padding:13px 14px;margin-bottom:6px;background:${checked ? ci.bg : '#e8e2da'};border:1.5px solid ${checked ? ci.border : '#d9d2c9'};border-radius:10px;gap:10px">
            <button onclick="toggleHabit('${h.id}')" style="width:22px;height:22px;border-radius:50%;border:2px solid ${checked ? ci.color : '#d1d5db'};background:${checked ? ci.color : 'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem">${checked ? '✓' : ''}</button>
            <span style="font-size:.95rem">${h.emoji}</span>
            <span style="font-size:.8rem;color:${checked ? '#111' : '#6b7280'};flex:1;font-weight:${checked ? 500 : 400}">${h.label}</span>
            <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
              <input type="number" min="0" max="24" step="0.5" value="${fh}" onchange="updateFastingHours(this.value)" placeholder="—" style="width:42px;padding:4px 6px;background:#ddd6cd;border:1px solid #c9c2b9;border-radius:6px;font-size:.78rem;text-align:center;font-family:inherit;color:#111">
              <span style="font-size:.62rem;color:#9ca3af">saat</span>
            </div>
          </div>`;
        } else {
          html += `
          <button onclick="toggleHabit('${h.id}')" style="display:flex;align-items:center;width:100%;padding:13px 14px;margin-bottom:6px;background:${checked ? ci.bg : '#e8e2da'};border:1.5px solid ${checked ? ci.border : '#d9d2c9'};border-radius:10px;gap:10px;text-align:left">
            <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${checked ? ci.color : '#d1d5db'};background:${checked ? ci.color : 'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem">${checked ? '✓' : ''}</div>
            <span style="font-size:.95rem">${h.emoji}</span>
            <span style="font-size:.8rem;color:${checked ? '#111' : '#6b7280'};flex:1;font-weight:${checked ? 500 : 400}">${h.label}</span>
            ${checked ? `<span style="font-size:.6rem;font-weight:600;color:${ci.color}">+${Math.round(100 / HABITS.length)}%</span>` : ''}
          </button>`;
        }
      }
      html += `</div>`;
    }

    // ── Takip Girişleri ───────────────────────────
    html += `
    <div style="margin-bottom:24px">
      <div style="font-size:.55rem;font-weight:700;color:#6366f1;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">Takip</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">`;

    for (const [key, emoji, label, unit, step, isFloat] of [
      ['weight',   '⚖️', 'Kilo',    'kg', '0.1', true ],
      ['stepCount','👣', 'Adım',    '',   '1',   false],
      ['spending', '💸', 'Harcama', '₺',  '1',   false],
    ]) {
      const val = dd[key] != null ? dd[key] : '';
      html += `
      <div style="background:#e8e2da;border:1px solid #d9d2c9;border-radius:10px;padding:10px 12px">
        <div style="font-size:.55rem;color:#9ca3af;margin-bottom:5px">${emoji} ${label}${unit ? ' (' + unit + ')' : ''}</div>
        <input type="number" step="${step}" value="${val}" onchange="updateField('${key}',this.value,${isFloat})" placeholder="—" style="width:100%;background:transparent;border:none;font-size:.9rem;font-weight:600;color:#111;font-family:inherit">
      </div>`;
    }
    html += `</div></div>`;

    // ── Günlük Görevler ───────────────────────────
    const tasks = dd.tasks || [];
    const doneCnt = tasks.filter(t => t.done).length;

    html += `
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:.55rem;font-weight:700;color:#7c3aed;letter-spacing:2px;text-transform:uppercase">Görevler</div>
        ${tasks.length ? `<div style="font-size:.62rem;color:#9ca3af">${doneCnt}/${tasks.length} tamamlandı</div>` : ''}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input type="text" id="task-input" placeholder="Yeni görev ekle..." onkeydown="if(event.key==='Enter')addTask()" style="flex:1;padding:10px 12px;background:#e8e2da;border:1.5px solid #d9d2c9;border-radius:8px;font-size:.8rem;color:#111;font-family:inherit">
        <button onclick="addTask()" style="padding:10px 16px;background:#111;color:#fff;border:none;border-radius:8px;font-size:1rem;line-height:1">+</button>
      </div>`;

    if (tasks.length === 0) {
      html += `<div style="text-align:center;padding:20px;color:#d1d5db;font-size:.78rem">Henüz görev yok</div>`;
    } else {
      for (const t of tasks) {
        html += `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #d9d2c9">
          <button onclick="toggleTask('${t.id}')" style="width:20px;height:20px;border-radius:5px;border:2px solid ${t.done ? '#7c3aed' : '#d1d5db'};background:${t.done ? '#7c3aed' : 'transparent'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem">${t.done ? '✓' : ''}</button>
          <span style="font-size:.8rem;color:${t.done ? '#9ca3af' : '#111'};text-decoration:${t.done ? 'line-through' : 'none'};flex:1;line-height:1.4">${escHtml(t.text)}</span>
          <button onclick="deleteTask('${t.id}')" style="background:none;border:none;color:#d1d5db;font-size:1.1rem;padding:0 4px;line-height:1">×</button>
        </div>`;
      }
    }
    html += `</div>`;
  }

  // ══════════════ HAFTA GÖRÜNÜMÜ ══════════════════
  if (view === 'week') {
    html += `<div style="display:flex;gap:6px;align-items:flex-end;height:150px;margin-bottom:20px">`;
    for (const d of wk) {
      const s = score(data, d.key);
      const col = d.key === cd ? '#111' : s >= 75 ? '#16a34a' : s >= 50 ? '#d97706' : s > 0 ? '#dc2626' : '#d9d2c9';
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%">
        <div style="flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center">
          <div style="width:100%;max-width:34px;height:${d.isFuture ? '2px' : Math.max(s, 4) + '%'};background:${col};border-radius:4px 4px 0 0"></div>
        </div>
        <div style="font-size:.5rem;color:#9ca3af;margin-top:4px;height:12px">${!d.isFuture && s > 0 ? s + '%' : ''}</div>
        <div style="font-size:.6rem;color:${d.key === cd ? '#111' : '#9ca3af'};font-weight:${d.key === cd ? 700 : 400}">${d.name}</div>
        <div style="font-size:.55rem;color:#d1d5db">${d.num}</div>
      </div>`;
    }
    html += `</div>`;

    const scored = wk.filter(d => !d.isFuture && score(data, d.key) > 0);
    const avg = scored.length ? Math.round(scored.reduce((s, d) => s + score(data, d.key), 0) / scored.length) : 0;

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="background:#e8e2da;border-radius:10px;padding:14px">
        <div style="font-size:.5rem;color:#9ca3af;letter-spacing:1px;margin-bottom:6px">HAFTALIK ORT.</div>
        <div style="font-size:1.6rem;font-weight:700;color:${avg >= 50 ? '#16a34a' : '#dc2626'}">${avg}%</div>
      </div>
      <div style="background:#e8e2da;border-radius:10px;padding:14px">
        <div style="font-size:.5rem;color:#9ca3af;letter-spacing:1px;margin-bottom:6px">AKTİF SERİ</div>
        <div style="font-size:1.6rem;font-weight:700;color:${sr >= 3 ? '#d97706' : '#9ca3af'}">${sr} <span style="font-size:.7rem;font-weight:400;color:#9ca3af">gün</span></div>
      </div>
    </div>`;

    html += `<div style="font-size:.5rem;color:#9ca3af;letter-spacing:1.5px;margin-bottom:12px">ALIŞKANLIK BAZINDA</div>`;
    for (const h of HABITS) {
      const hits = wk.filter(d => !d.isFuture && data[d.key]?.habits?.[h.id]).length;
      const total = wk.filter(d => !d.isFuture).length || 1;
      const pct = Math.round(hits / total * 100);
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span style="font-size:.85rem;width:22px">${h.emoji}</span>
        <span style="font-size:.72rem;color:#6b7280;flex:1">${h.label}</span>
        <div style="width:70px;height:5px;background:#f3f4f6;border-radius:3px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${CAT[h.category].color};border-radius:3px"></div>
        </div>
        <span style="font-size:.62rem;color:#9ca3af;width:28px;text-align:right">${pct}%</span>
      </div>`;
    }
  }

  // ══════════════ VERİ GÖRÜNÜMÜ ══════════════════
  if (view === 'data') {

    // Kilo
    html += `<div style="margin-bottom:22px">
      <div style="font-size:.5rem;color:#9ca3af;letter-spacing:1.5px;margin-bottom:10px">KİLO GEÇMİŞİ</div>
      <div style="background:#e8e2da;border-radius:10px;padding:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:12px">
          <div><div style="font-size:.5rem;color:#9ca3af;margin-bottom:3px">Başlangıç</div><div style="font-size:1.05rem;font-weight:600">${START_WEIGHT} kg</div></div>
          <div style="text-align:center"><div style="font-size:.5rem;color:#9ca3af;margin-bottom:3px">Güncel</div><div style="font-size:1.05rem;font-weight:600">${lw || '—'} kg</div></div>
          <div style="text-align:right"><div style="font-size:.5rem;color:#9ca3af;margin-bottom:3px">Değişim</div><div style="font-size:1.05rem;font-weight:600;color:${parseFloat(wc) <= 0 ? '#16a34a' : '#dc2626'}">${wc ? wc + ' kg' : '—'}</div></div>
        </div>`;
    const wEntries = Object.keys(data).sort().reverse().filter(k => data[k]?.weight);
    if (wEntries.length) {
      html += `<div style="max-height:180px;overflow-y:auto">`;
      for (const k of wEntries) {
        const diff = (data[k].weight - START_WEIGHT).toFixed(1);
        html += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #d9d2c9;font-size:.75rem">
          <span style="color:#9ca3af">${new Date(k+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</span>
          <span style="font-weight:500">${data[k].weight} kg</span>
          <span style="color:${diff <= 0 ? '#16a34a' : '#dc2626'}">${diff > 0 ? '+' : ''}${diff}</span>
        </div>`;
      }
      html += `</div>`;
    } else { html += `<div style="color:#d1d5db;font-size:.75rem;text-align:center">Henüz kilo verisi yok</div>`; }
    html += `</div></div>`;

    // Adım
    html += `<div style="margin-bottom:22px">
      <div style="font-size:.5rem;color:#9ca3af;letter-spacing:1.5px;margin-bottom:10px">ADIM GEÇMİŞİ</div>
      <div style="background:#e8e2da;border-radius:10px;padding:14px">`;
    const sEntries = Object.keys(data).sort().reverse().filter(k => data[k]?.stepCount);
    if (sEntries.length) {
      html += `<div style="max-height:180px;overflow-y:auto">`;
      for (const k of sEntries) {
        html += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #d9d2c9;font-size:.75rem">
          <span style="color:#9ca3af">${new Date(k+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</span>
          <span style="font-weight:500;color:${data[k].stepCount >= 5000 ? '#16a34a' : '#d97706'}">${data[k].stepCount.toLocaleString('tr-TR')} adım</span>
        </div>`;
      }
      html += `</div>`;
    } else { html += `<div style="color:#d1d5db;font-size:.75rem;text-align:center">Henüz adım verisi yok</div>`; }
    html += `</div></div>`;

    // Harcama
    html += `<div style="margin-bottom:22px">
      <div style="font-size:.5rem;color:#9ca3af;letter-spacing:1.5px;margin-bottom:10px">HARCAMA GEÇMİŞİ</div>
      <div style="background:#e8e2da;border-radius:10px;padding:14px">`;
    const spEntries = Object.keys(data).sort().reverse().filter(k => data[k]?.spending != null);
    if (spEntries.length) {
      const total = spEntries.reduce((s, k) => s + (data[k].spending || 0), 0);
      html += `<div style="font-size:.75rem;font-weight:600;color:#111;margin-bottom:10px">Toplam: ${total.toLocaleString('tr-TR')} ₺</div>`;
      html += `<div style="max-height:180px;overflow-y:auto">`;
      for (const k of spEntries) {
        html += `<div style="display:flex;justify-content:space-between;padding:7px 0;border-top:1px solid #d9d2c9;font-size:.75rem">
          <span style="color:#9ca3af">${new Date(k+'T00:00:00').toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</span>
          <span style="font-weight:500">${data[k].spending.toLocaleString('tr-TR')} ₺</span>
        </div>`;
      }
      html += `</div>`;
    } else { html += `<div style="color:#d1d5db;font-size:.75rem;text-align:center">Henüz harcama verisi yok</div>`; }
    html += `</div></div>`;

    html += `<div style="text-align:center">
      <button onclick="resetAll()" style="background:none;border:1px solid #fee2e2;border-radius:8px;color:#dc2626;font-size:.65rem;padding:9px 18px">Tüm Verileri Sıfırla</button>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('app').innerHTML = html;
}

// ── Yardımcı ──────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Eylemler ──────────────────────────────────────────
function toggleHabit(id) {
  const dd = dayData(S.cd);
  dd.habits[id] = !dd.habits[id];
  save(S.data);
  render();
}

function updateField(key, val, isFloat) {
  const dd = dayData(S.cd);
  dd[key] = val ? (isFloat ? parseFloat(val) : parseInt(val)) : null;
  save(S.data);
}

function updateFastingHours(val) {
  const dd = dayData(S.cd);
  dd.fastingHours = val ? parseFloat(val) : null;
  save(S.data);
}

function addTask() {
  const inp = document.getElementById('task-input');
  const text = inp?.value?.trim();
  if (!text) return;
  const dd = dayData(S.cd);
  dd.tasks.push({ id: Date.now().toString(), text, done: false });
  save(S.data);
  render();
}

function toggleTask(id) {
  const t = dayData(S.cd).tasks?.find(t => t.id === id);
  if (t) { t.done = !t.done; save(S.data); render(); }
}

function deleteTask(id) {
  const dd = dayData(S.cd);
  dd.tasks = dd.tasks.filter(t => t.id !== id);
  save(S.data);
  render();
}

function navDate(dir) {
  const d = new Date(S.cd + "T00:00:00");
  d.setDate(d.getDate() + dir);
  if (d <= new Date()) { S.cd = dk(d); render(); }
}

function setDate(k) { if (k <= today()) { S.cd = k; render(); } }
function goToday() { S.cd = today(); render(); }
function setView(v) { S.view = v; render(); }

function resetAll() {
  if (confirm("Tüm veriler silinecek. Emin misin?")) {
    S.data = {};
    localStorage.removeItem(KEY);
    render();
  }
}

render();
</script>
</body>
</html>
